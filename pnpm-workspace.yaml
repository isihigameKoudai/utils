packages:
  - '.'

minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'semver@6.3.1'
  - 'reselect@5.1.1'
blockExoticSubdeps: true
allowBuilds:
  '@anthropic-ai/claude-code': true
  '@google/genai': true
  esbuild: true
  protobufjs: true
  unrs-resolver: true
